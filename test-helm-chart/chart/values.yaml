replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10

nodeSelector: {}
tolerations: []
affinity: {}

global:
  env: dev

redis:
  enabled: true
  port: 6379

postgres:
  enabled: true
  port: 5432

kafka:
  enabled: false
  brokers: 3

monitoring:
  enabled: true
  scrapeInterval: 30s
